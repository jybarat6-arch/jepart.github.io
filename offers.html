<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>العروض الخاصة — المتمتع</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div id="nav-root"></div>
<section class="section">
  <div class="sec-title" style="margin-bottom:20px;"><i class="ti ti-bolt"></i> العروض <span>الخاصة</span></div>
  <div class="promo-banner" style="margin:0 0 32px;">
    <div class="pb-txt"><h2>كود خصم <span>15%</span> للأعضاء الجدد</h2><p>استخدم الكود عند الشراء — لفترة محدودة</p></div>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
      <div class="pb-code"><div class="pb-code-lbl">كود الخصم</div><div class="pb-code-val" onclick="navigator.clipboard&&navigator.clipboard.writeText('MOTMEE15');toast('✓ تم نسخ الكود')">MOTMEE15</div><div class="pb-code-disc">انقر لنسخ الكود</div></div>
      <button class="btn-pr">سجّل الآن</button>
    </div>
  </div>
  <div class="products-grid" id="offers-grid"></div>
</section>
<div id="footer-root"></div>
<script src="nav.js"></script>
<script>
document.getElementById('nav-root').innerHTML=renderNav('عروض خاصة');
document.getElementById('footer-root').innerHTML=renderFooter();
updateCartUI();
document.getElementById('offers-grid').innerHTML=PRODUCTS.filter(p=>p.disc).map(renderProductCard).join('');
</script>
</body></html>
